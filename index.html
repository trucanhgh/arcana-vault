<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💫 Fortune Cookie</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
</head>
<body>

<header class="site-header" id="top">
  <div class="header-inner">
    <button class="brand-home" id="brandHome" type="button" aria-label="Về đầu trang">
      <span class="brand-icon">🌕</span>
      <span class="brand-copy">
        <span class="brand-title">Fortune Cookie</span>
        <span class="brand-subtitle">by babychewimi</span>
      </span>
    </button>

    <div class="search-wrap header-search">
      <input type="text" id="search" placeholder="Tìm lá tarot...">
    </div>

    <div class="header-actions">
      <label class="lang-wrap" for="langDesktop">
        <span>Lang</span>
        <select id="langDesktop" class="lang-select-input">
          <option value="vi" selected>VI</option>
          <option value="en">ENG</option>
        </select>
      </label>
      <button id="menuToggle" class="menu-toggle" type="button" aria-label="Mở menu">☰</button>
    </div>
  </div>

  <div id="mobilePanel" class="mobile-panel">
    <div class="tabs mobile-tabs">
      <button class="tab active" data-suit="all">Tất cả (78)</button>
      <button class="tab" data-suit="major">✦ Major Arcana (22)</button>
      <button class="tab" data-suit="wands">✦ Wands (14)</button>
      <button class="tab" data-suit="cups">✦ Cups (14)</button>
      <button class="tab" data-suit="swords">✦ Swords (14)</button>
      <button class="tab" data-suit="pents">✦ Pentacles (14)</button>
    </div>
    <label class="lang-wrap mobile-lang" for="langMobile">
      <span>Ngôn ngữ</span>
      <select id="langMobile" class="lang-select-input">
        <option value="vi" selected>VI</option>
        <option value="en">ENG</option>
      </select>
    </label>
  </div>
</header>

<section class="hero">
  <h1>Tarot Cheatsheet</h1>
  <p class="subtitle"></p>
</section>

<div class="tabs desktop-tabs">
  <button class="tab active" data-suit="all">Tất cả (78)</button>
  <button class="tab" data-suit="major">✦ Major Arcana (22)</button>
  <button class="tab" data-suit="wands">✦ Wands (14)</button>
  <button class="tab" data-suit="cups">✦ Cups (14)</button>
  <button class="tab" data-suit="swords">✦ Swords (14)</button>
  <button class="tab" data-suit="pents">✦ Pentacles (14)</button>
</div>

<div class="count" id="count">78 lá</div>

<div class="grid" id="grid"></div>

<footer class="site-footer">
  <p>
    .
  </p>
  <p>
    Contact: babychewimi@gmail.com · threads: @babychewimi
  </p>
</footer>

<button id="backToTop" class="back-to-top" type="button" aria-label="Quay về đầu trang">⚜️</button>
<script type="module" src="js/main.js"></script>
</body>
</html>
